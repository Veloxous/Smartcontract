name: Changelog

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.2.0)
        required: true

jobs:
  generate-changelog:
    name: Generate changelog & release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history for conventional-changelog

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install conventional-changelog-cli
        run: npm install -g conventional-changelog-cli

      # Generate a full CHANGELOG.md (all history, Angular preset matches our
      # Conventional Commits format: feat/fix/docs/ci/refactor/chore).
      - name: Generate CHANGELOG.md
        run: |
          conventional-changelog \
            --preset angular \
            --release-count 0 \
            --outfile CHANGELOG.md
          echo "Generated CHANGELOG.md:"
          head -60 CHANGELOG.md

      # Commit CHANGELOG.md back to main so it stays in the repo.
      - name: Commit updated changelog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Only commit if there are changes
          git diff --cached --quiet || \
            git commit -m "docs: update CHANGELOG for ${{ steps.tag.outputs.name }} [skip ci]"
          git push origin HEAD:main

      # Extract just the notes for this release (between this tag and the
      # previous one) to use as the GitHub release body.
      - name: Extract release notes for this tag
        id: release_notes
        run: |
          conventional-changelog \
            --preset angular \
            --release-count 1 \
            --outfile /tmp/release-notes.md
          echo "Release notes:"
          cat /tmp/release-notes.md

      # Create or update the GitHub release for the tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Create release if it doesn't exist; update if it does.
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file /tmp/release-notes.md \
              --draft=false \
              --prerelease=false
          fi
          echo "Release $TAG created/updated."
