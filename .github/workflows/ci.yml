name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  STELLAR_CLI_VERSION: "26.1.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar
          stellar --version

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build contracts (wasm)
        # The integration tests `contractimport!` the built wasm, so build first.
        run: stellar contract build

      - name: Test
        run: cargo test --all --quiet

      - name: Check WASM sizes (#100)
        run: |
          echo "Contract WASM sizes:"
          FAILED=0
          # Budget: 128 KiB per contract (Stellar's recommended limit for affordable deployment)
          BUDGET_BYTES=131072
          for f in target/wasm32v1-none/release/*.wasm; do
            name=$(basename "$f" .wasm)
            size=$(wc -c < "$f")
            printf "  %-40s %7d bytes\n" "$name" "$size"
            if [ "$size" -gt "$BUDGET_BYTES" ]; then
              echo "  ❌ $name exceeds ${BUDGET_BYTES}-byte budget by $((size - BUDGET_BYTES)) bytes"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more contracts exceed the WASM size budget. Optimise with wasm-opt -O3."
            exit 1
          fi
          echo "All contracts within budget."
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  abi-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar

      - name: Build PR branch contracts
        run: stellar contract build

      - name: Extract PR branch ABI
        run: |
          mkdir -p .abi/pr
          stellar contract inspect --wasm target/wasm32v1-none/release/project_registry.wasm > .abi/pr/project_registry.txt 2>&1
          stellar contract inspect --wasm target/wasm32v1-none/release/investment_vault.wasm > .abi/pr/investment_vault.txt 2>&1

      - name: Setup base branch worktree
        run: |
          git fetch origin ${{ github.base_ref }}
          git worktree add /tmp/base origin/${{ github.base_ref }}

      - name: Build base branch contracts
        working-directory: /tmp/base
        env:
          CARGO_TARGET_DIR: /tmp/base-target
        run: stellar contract build

      - name: Extract base branch ABI
        env:
          CARGO_TARGET_DIR: /tmp/base-target
        run: |
          mkdir -p .abi/base
          stellar contract inspect --wasm /tmp/base-target/wasm32v1-none/release/project_registry.wasm > .abi/base/project_registry.txt 2>&1
          stellar contract inspect --wasm /tmp/base-target/wasm32v1-none/release/investment_vault.wasm > .abi/base/investment_vault.txt 2>&1

      - name: Check for breaking ABI changes
        run: |
          failed=false
          for contract in project_registry investment_vault; do
            if ! diff -u .abi/base/${contract}.txt .abi/pr/${contract}.txt > /dev/null 2>&1; then
              echo "ABI changed for ${contract}:"
              diff -u .abi/base/${contract}.txt .abi/pr/${contract}.txt || true
              failed=true
            fi
          done
          if [ "$failed" = "true" ]; then
            echo "::error::Breaking ABI changes detected. Review the diff above and update integrations accordingly."
            exit 1
          fi
          echo "No ABI changes detected."

      - name: Upload ABI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-abi-${{ github.sha }}
          path: .abi/
