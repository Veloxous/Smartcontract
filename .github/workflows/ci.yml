name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  STELLAR_CLI_VERSION: "26.1.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar
          stellar --version

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build contracts (wasm)
        # The integration tests `contractimport!` the built wasm, so build first.
        run: stellar contract build

      - name: Test
        run: cargo test --all --quiet
