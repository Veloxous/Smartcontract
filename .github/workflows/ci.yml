name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  STELLAR_CLI_VERSION: "26.1.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar
          stellar --version

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build contracts (wasm)
        # The integration tests `contractimport!` the built wasm, so build first.
        run: stellar contract build

      - name: Test
        run: cargo test --all --quiet

      - name: Check WASM sizes (#100)
        run: |
          echo "Contract WASM sizes:"
          FAILED=0
          # Budget: 128 KiB per contract (Stellar's recommended limit for affordable deployment)
          BUDGET_BYTES=131072
          for f in target/wasm32v1-none/release/*.wasm; do
            name=$(basename "$f" .wasm)
            size=$(wc -c < "$f")
            printf "  %-40s %7d bytes\n" "$name" "$size"
            if [ "$size" -gt "$BUDGET_BYTES" ]; then
              echo "  ❌ $name exceeds ${BUDGET_BYTES}-byte budget by $((size - BUDGET_BYTES)) bytes"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more contracts exceed the WASM size budget. Optimise with wasm-opt -O3."
            exit 1
          fi
          echo "All contracts within budget."
