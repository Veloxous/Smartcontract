name: Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        required: true
        default: testnet
        type: choice
        options: [testnet, mainnet]
      admin_address:
        description: Admin address
        required: true
      whitelister_address:
        description: Whitelister address
        required: true
      usdc_sac_address:
        description: USDC SAC address
        required: true

concurrency:
  group: deploy-${{ github.event.inputs.network }}
  cancel-in-progress: false

env:
  STELLAR_CLI_VERSION: "26.1.0"

jobs:
  build-and-verify:
    name: Build & verify
    runs-on: ubuntu-latest
    outputs:
      registry_wasm: ${{ steps.paths.outputs.registry }}
      vault_wasm: ${{ steps.paths.outputs.vault }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar

      - name: Build contracts
        run: stellar contract build

      - name: Run tests (pre-deploy gate)
        run: cargo test --all --quiet

      - name: Check WASM sizes
        run: |
          FAILED=0
          BUDGET_BYTES=131072
          for f in target/wasm32v1-none/release/*.wasm; do
            name=$(basename "$f" .wasm)
            size=$(wc -c < "$f")
            printf "  %-40s %7d bytes\n" "$name" "$size"
            if [ "$size" -gt "$BUDGET_BYTES" ]; then
              echo "❌ $name exceeds budget"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Set wasm paths
        id: paths
        run: |
          echo "registry=target/wasm32v1-none/release/project_registry.wasm" >> "$GITHUB_OUTPUT"
          echo "vault=target/wasm32v1-none/release/investment_vault.wasm"     >> "$GITHUB_OUTPUT"

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ github.sha }}
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 7

  deploy:
    name: Deploy to ${{ github.event.inputs.network }}
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Stellar CLI
        run: |
          url="https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv stellar /usr/local/bin/stellar

      - name: Download wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-${{ github.sha }}
          path: target/wasm32v1-none/release/

      - name: Deploy ProjectRegistry
        id: deploy_registry
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          REGISTRY_ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/project_registry.wasm \
            --source "$STELLAR_SECRET_KEY" \
            --network "${{ github.event.inputs.network }}" \
            -- \
            --admin "${{ github.event.inputs.admin_address }}" \
            --whitelister "${{ github.event.inputs.whitelister_address }}")
          echo "registry_id=$REGISTRY_ID" >> "$GITHUB_OUTPUT"
          echo "ProjectRegistry deployed: $REGISTRY_ID"

      - name: Deploy InvestmentVault
        id: deploy_vault
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          VAULT_ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/investment_vault.wasm \
            --source "$STELLAR_SECRET_KEY" \
            --network "${{ github.event.inputs.network }}" \
            -- \
            --admin "${{ github.event.inputs.admin_address }}" \
            --usdc_sac "${{ github.event.inputs.usdc_sac_address }}" \
            --registry "${{ steps.deploy_registry.outputs.registry_id }}")
          echo "vault_id=$VAULT_ID" >> "$GITHUB_OUTPUT"
          echo "InvestmentVault deployed: $VAULT_ID"

      - name: Post-deployment verification
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          NETWORK="${{ github.event.inputs.network }}"
          REGISTRY="${{ steps.deploy_registry.outputs.registry_id }}"
          VAULT="${{ steps.deploy_vault.outputs.vault_id }}"
          echo "Verifying ProjectRegistry ($REGISTRY) …"
          stellar contract invoke \
            --id "$REGISTRY" \
            --source "$STELLAR_SECRET_KEY" \
            --network "$NETWORK" \
            -- total_projects
          echo "Verifying InvestmentVault ($VAULT) …"
          stellar contract invoke \
            --id "$VAULT" \
            --source "$STELLAR_SECRET_KEY" \
            --network "$NETWORK" \
            -- total_assets
          echo "✅ Both contracts responding correctly."

      - name: Summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | Network | Contract ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ProjectRegistry | ${{ github.event.inputs.network }} | ${{ steps.deploy_registry.outputs.registry_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| InvestmentVault | ${{ github.event.inputs.network }} | ${{ steps.deploy_vault.outputs.vault_id }} |" >> "$GITHUB_STEP_SUMMARY"
